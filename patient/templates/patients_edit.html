<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
            url('https://i.pinimg.com/originals/eb/2f/95/eb2f955cc1ba643c0d3a9e68543a9aa7.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* GLASS CARD */
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: none;
            animation: fadeUp 0.8s ease;
        }

        /* TITLE */
        .card-title {
            font-weight: 700;
            color: white;
        }

        /* INPUT */
        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 10px;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.15);
            color: white;
            box-shadow: 0 0 10px rgba(0,255,200,0.5);
        }

        label {
            color: #ddd;
        }

        /* BUTTONS */
        .btn-primary {
            background: linear-gradient(135deg,#00c896,#00a86b);
            border: none;
            border-radius: 25px;
            padding: 8px 20px;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-secondary {
            border-radius: 25px;
        }

        /* ANIMATION */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5">

            <div class="card p-4">
                <div class="card-body">

                    <h2 class="card-title mb-4 text-center">
                        <i class="fas fa-user-edit me-2"></i>Edit Patient
                    </h2>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   value="{{ patient.name }}" placeholder="Enter patient name" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="text" class="form-control" id="phone" name="phone"
                                   value="{{ patient.phone }}" placeholder="Enter phone number" required>
                        </div>

                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Save
                            </button>

                            <a href="{% url 'patient_list' %}" class="btn btn-secondary">
                                Back
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
