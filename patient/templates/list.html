<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient List - G+Hospital</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0066cc;
            --secondary-color: #00c896;
        }

        /* BACKGROUND */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
            url('https://i.pinimg.com/originals/eb/2f/95/eb2f955cc1ba643c0d3a9e68543a9aa7.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .nav-link {
            color: white !important;
        }

        /* MAIN CARD */
        .list-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            margin: 50px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeUp 0.7s ease;
        }

        /* HEADER */
        .list-header h2 {
            font-weight: 700;
        }

        /* PATIENT CARD */
        .patient-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--secondary-color);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        /* HOVER EFFECT */
        .patient-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 10px 30px rgba(0,255,200,0.4);
        }

        /* LIGHT ANIMATION */
        .patient-card::before {
            content: "";
            position: absolute;
            width: 120%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
            top: 0;
            left: -120%;
            transition: 0.6s;
        }

        .patient-card:hover::before {
            left: 100%;
        }

        /* TEXT */
        .patient-name {
            font-weight: 600;
            color: white;
        }

        .patient-info {
            color: #ddd;
        }

        /* BUTTONS */
        .btn-success {
            background: linear-gradient(135deg,#00c896,#00a86b);
            border: none;
        }

        .btn-primary {
            border-radius: 20px;
        }

        .delete-btn {
            background: #ff4d4d;
            border-radius: 20px;
            color: white;
        }

        /* FOOTER */
        footer {
            background: rgba(0,0,0,0.7);
            text-align: center;
            padding: 15px;
        }

        /* ANIMATION */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand text-white" href="/">
            <i class="fas fa-hospital"></i> G+Hospital
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li><a class="nav-link" href="/">Home</a></li>
                <li><a class="nav-link" href="/contact">Contact</a></li>
                <li><a class="nav-link" href="/dashboard">dashboard</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- LIST -->
<div class="list-card">

    <div class="list-header text-center mb-4">
        <h2><i class="fas fa-users me-2 text-info"></i>Patient List</h2>
        <p class="text-light">Manage all patients easily</p>

        <a href="{% url 'patient_create' %}" class="btn btn-success">
            <i class="fas fa-plus"></i> Create Patient
        </a>
    </div>

    {% if patients %}
        {% for p in patients %}
        <div class="patient-card">

            <div class="d-flex justify-content-between align-items-center">

                <div>
                    <div class="patient-name">
                        <i class="fas fa-user me-2"></i>{{ p.name }}
                    </div>

                    <div class="patient-info">
                        <i class="fas fa-phone me-2"></i>{{ p.phone }}
                    </div>

                    <div class="patient-info">
                        <i class="fas fa-envelope me-2"></i>{{ p.email }}
                    </div>
                </div>

                <!-- ACTIONS -->
                <div>
                    <a href="{% url 'patients_edit' p.id %}" class="btn btn-sm btn-primary">
                        <i class="fas fa-edit"></i>
                    </a>

                    <a href="{% url 'patient_delete' p.id %}"
                       class="btn btn-sm delete-btn"
                       onclick="return confirm('Are you sure to delete this patient?');">
                        <i class="fas fa-trash"></i>
                    </a>
                </div>

            </div>

        </div>
        {% endfor %}
    {% else %}
        <p class="text-center text-light">No patients registered yet.</p>
    {% endif %}

</div>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 G+Hospital |
        <a href="/" class="text-white">Home</a> |
        <a href="/contact" class="text-white">Contact</a>
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
