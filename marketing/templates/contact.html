<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - MedhaHospital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Animate -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://wallpaperaccess.com/full/958470.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      color: #fff;
    }

    .contact-header {
      text-align: center;
      padding: 40px 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .contact-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .info-box {
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.15);
      margin-bottom: 20px;
      transition: 0.3s;
    }

    .info-box:hover {
      transform: scale(1.03);
      background: rgba(255,255,255,0.25);
    }

    .info-box i {
      font-size: 24px;
      margin-bottom: 10px;
      color: #00f2fe;
    }

    .btn-home {
      background: linear-gradient(135deg, #00a86b, #0066cc);
      border-radius: 30px;
      padding: 10px 25px;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn-home:hover {
      transform: scale(1.05);
    }

  </style>
</head>

<body>

  <!-- Header -->
  <div class="contact-header animate__animated animate__fadeInDown">
    <h1>📞 Contact Us</h1>
    <p>We are here to help you 24/7</p>
  </div>

  <!-- Contact Info -->
  <div class="container mt-4 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        
        <div class="contact-card text-center">

          <!-- Address -->
          <div class="info-box">
            <i class="bi bi-geo-alt-fill"></i>
            <h5>Our Location</h5>
            <p>G+Hospital, Ameerpet, Hyderabad, Telangana, India</p>
          </div>

          <!-- Phone -->
          <div class="info-box">
            <i class="bi bi-telephone-fill"></i>
            <h5>Call Us</h5>
            <p>+91 98765 43210</p>
            <p>Emergency: +91 99999 88888</p>
          </div>

          <!-- Email -->
          <div class="info-box">
            <i class="bi bi-envelope-fill"></i>
            <h5>Email</h5>
            <p>info@G+hospital.com</p>
            <p>support@G+hospital.com</p>
          </div>

          <!-- Working Hours -->
          <div class="info-box">
            <i class="bi bi-clock-fill"></i>
            <h5>Working Hours</h5>
            <p>Mon - Sat: 9:00 AM - 9:00 PM</p>
            <p>Sunday: Emergency Only</p>
          </div>

          <!-- Button -->
          <a href="{% url 'home' %}" class="btn btn-home text-white mt-3">
            <i class="bi bi-house-door-fill"></i> Back to Home
          </a>

        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
