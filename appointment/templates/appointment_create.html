<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
             url('https://i.pinimg.com/originals/eb/2f/95/eb2f955cc1ba643c0d3a9e68543a9aa7.jpg') no-repeat center center/cover;

             min-height: 100vh;
             color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 16px 50px rgba(0,0,0,0.08);
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }
        .form-header h2 {
            margin: 0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card">
                    <div class="form-header">
                        <h2>Create Appointment</h2>
                        <p class="mb-0 text-white-75">Select patient, doctor and schedule the appointment.</p>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="patient" class="form-label">Patient</label>
                                <select id="patient" name="patient" class="form-select" required>
                                    <option value="">Choose patient</option>
                                    {% for patient in patients %}
                                        <option value="{{ patient.id }}">{{ patient.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="doctor" class="form-label">Doctor</label>
                                <select id="doctor" name="doctor" class="form-select" required>
                                    <option value="">Choose doctor</option>
                                    {% for doctor in doctors %}
                                        <option value="{{ doctor.id }}">{{ doctor.name }} - {{ doctor.specialization }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="appointment" class="form-label">Appointment Date & Time</label>
                                <input type="datetime-local" id="appointment" name="appointment" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="appointment_status" class="form-label">Status</label>
                                <input type="text" id="appointment_status" name="appointment_status" class="form-control" placeholder="Pending, Confirmed, Cancelled" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Create Appointment</button>
                                <a href="{% url 'appointment_list' %}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
